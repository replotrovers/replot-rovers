<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Replot Rovers FC</title>

<style>
.navbar{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(8px);
    z-index:1000;
}

.navbar ul{
    list-style:none;
    display:flex;
    justify-content:center;
    gap:30px;
    margin:0;
    padding:20px;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.navbar a:hover{
    opacity:0.7;
}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.hero{
    text-align:center;
    padding:100px 20px;
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url('https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=2000');
    background-size:cover;
    background-position:center;
}

.hero h1{
    font-size:4rem;
    margin-bottom:10px;
}

.hero p{
    font-size:1.3rem;
}

.section{
    max-width:1000px;
    margin:auto;
    padding:60px 20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}
</style>
</head>

<body>

<section class="hero">

<img src="Wow logo.png" alt="Replot Rovers Badge"
style="width:180px; margin-bottom:20px;">

<h1>Replot Rovers FC</h1>

<p>Football. Community. Sustainability.</p>

</section>

<section class="section">
<h2>Our Mission</h2>

<div class="card">
Creating a football club that brings people together through sport,
community and environmental responsibility.
</div>
</section>

<section class="section">
<h2>Latest News</h2>

<div class="card">
Website officially launched.
</div>
</section>

<section class="section">
<h2>Sponsors</h2>

<div class="card">
Become a founding sponsor of Replot Rovers.
</div>
</section>

</body>
</html>
